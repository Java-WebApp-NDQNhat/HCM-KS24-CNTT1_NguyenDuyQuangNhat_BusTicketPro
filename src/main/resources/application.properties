spring.application.name=trans_route

#datasource
spring.datasource.url=jdbc:mysql://localhost:3306/trans_route?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

#spring starter mail
spring.mail.host=smtp.gmail.com
spring.mail.port=587
#mail cung~ fill khi can` dung` den'
spring.mail.username=
#xoa' password khi up git, neu muon gui mail thi phai tao app password tren gmail va copy vao day
spring.mail.password=
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

