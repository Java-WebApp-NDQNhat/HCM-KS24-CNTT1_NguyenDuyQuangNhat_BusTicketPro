<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
  <head th:replace="~{fragments/head :: commonHead('TransRoute - Profile', @{/css/profile.css}, ${pageKind})}"></head>
  <body class="bg-background text-on-background font-body-md min-h-screen flex antialiased">
    <div th:replace="~{fragments/sidebar :: sidebar('settings')}"></div>

    <main class="flex-1 md:ml-[280px] flex flex-col min-h-screen">
      <header th:replace="~{fragments/component/header :: sharedTopbar}"></header>

      <div class="p-margin-mobile md:p-margin-desktop max-w-7xl mx-auto w-full flex-1 flex flex-col gap-lg">
        <div class="mb-sm">
          <h2 class="font-headline-lg text-headline-lg md:text-display-lg font-bold text-on-surface tracking-tight">Profile & Security</h2>
          <p class="font-body-lg text-body-lg text-on-surface-variant mt-xs">Quản lý thông tin cá nhân và bảo mật tài khoản.</p>
        </div>

        <div th:if="${profileSuccess}" class="rounded-lg bg-[#dcfce7] text-[#166534] px-md py-sm font-body-md" th:text="${profileSuccess}"></div>
        <div th:if="${passwordSuccess}" class="rounded-lg bg-[#dcfce7] text-[#166534] px-md py-sm font-body-md" th:text="${passwordSuccess}"></div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-lg">
          <div class="lg:col-span-1 flex flex-col gap-lg">
            <div class="glass-card rounded-xl p-lg flex flex-col items-center text-center relative overflow-hidden">
              <div class="absolute top-0 left-0 w-full h-24 bg-gradient-to-r from-surface-container-high to-surface-variant opacity-50"></div>
              <div class="relative mt-md">
                <div class="w-32 h-32 rounded-full overflow-hidden border-4 border-surface-container-lowest shadow-sm bg-surface-container">
                  <img th:src="${avatarUrl}" alt="Avatar" class="w-full h-full object-cover" />
                </div>
              </div>
              <h3 class="font-title-lg text-title-lg font-bold text-on-surface mt-md" th:text="${user.userName}">User</h3>
              <p class="font-label-md text-label-md text-on-surface-variant" th:text="${roleLabel}">Role</p>
              <p class="font-label-sm text-label-sm text-on-surface-variant mt-xs" th:text="${user.email}">email</p>
              <div class="mt-lg w-full flex justify-center gap-md">
                <span class="inline-flex items-center gap-xs px-2 py-1 rounded-full bg-surface-container-high text-primary font-label-sm text-label-sm">
                  <span class="material-symbols-outlined text-[14px]">verified_user</span> Verified
                </span>
              </div>
            </div>
          </div>

          <div class="lg:col-span-2 flex flex-col gap-lg">
            <div class="glass-card rounded-xl p-lg">
              <div class="flex items-center gap-sm mb-lg">
                <span class="material-symbols-outlined text-primary">person</span>
                <h3 class="font-title-lg text-title-lg font-bold text-on-surface">Thông tin cá nhân</h3>
              </div>
              <form th:action="@{/profile/update}" method="post" th:object="${profileForm}" class="grid grid-cols-1 md:grid-cols-2 gap-md">
                <div class="flex flex-col gap-xs md:col-span-2">
                  <label class="font-label-md text-label-md text-on-surface-variant">Tên người dùng <span class="text-error">*</span></label>
                  <input th:field="*{userName}"
                         class="w-full px-md py-sm rounded-lg border border-outline-variant/50 bg-surface-container-lowest font-body-md text-on-surface input-glow transition-all duration-200"
                         type="text" required />
                  <p class="text-sm text-error" th:if="${#fields.hasErrors('userName')}" th:errors="*{userName}"></p>
                </div>
                <div class="flex flex-col gap-xs md:col-span-2">
                  <label class="font-label-md text-label-md text-on-surface-variant">Email</label>
                  <div class="relative">
                    <span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-outline-variant">mail</span>
                    <input th:value="${user.email}" readonly
                           class="w-full pl-xl pr-md py-sm rounded-lg border border-outline-variant/50 bg-surface-container-low font-body-md text-on-surface-variant cursor-not-allowed"
                           type="email" />
                  </div>
                  <p class="font-label-sm text-on-surface-variant">Email không thể thay đổi (dùng để đăng nhập).</p>
                </div>
                <div class="flex flex-col gap-xs">
                  <label class="font-label-md text-label-md text-on-surface-variant">Số điện thoại <span class="text-error">*</span></label>
                  <div class="relative">
                    <span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-outline-variant">phone</span>
                    <input th:field="*{phone}"
                           class="w-full pl-xl pr-md py-sm rounded-lg border border-outline-variant/50 bg-surface-container-lowest font-body-md text-on-surface input-glow transition-all duration-200"
                           type="tel" required />
                  </div>
                  <p class="text-sm text-error" th:if="${#fields.hasErrors('phone')}" th:errors="*{phone}"></p>
                </div>
                <div class="flex flex-col gap-xs">
                  <label class="font-label-md text-label-md text-on-surface-variant">Địa chỉ</label>
                  <div class="relative">
                    <span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-outline-variant">home</span>
                    <input th:field="*{address}"
                           class="w-full pl-xl pr-md py-sm rounded-lg border border-outline-variant/50 bg-surface-container-lowest font-body-md text-on-surface input-glow transition-all duration-200"
                           type="text" placeholder="VD: Hà Nội, Việt Nam" />
                  </div>
                </div>
                <div class="md:col-span-2 flex justify-end mt-sm">
                  <button class="bg-primary text-on-primary hover:bg-surface-tint px-lg py-sm rounded-lg font-label-md text-label-md font-semibold transition-colors duration-200" type="submit">
                    Lưu thay đổi
                  </button>
                </div>
              </form>
            </div>

            <div class="glass-card rounded-xl p-lg">
              <div class="flex items-center gap-sm mb-lg">
                <span class="material-symbols-outlined text-primary">lock</span>
                <h3 class="font-title-lg text-title-lg font-bold text-on-surface">Đổi mật khẩu</h3>
              </div>
              <form th:action="@{/profile/password}" method="post" th:object="${passwordForm}" class="flex flex-col gap-md">
                <div class="flex flex-col gap-xs">
                  <label class="font-label-md text-label-md text-on-surface-variant">Mật khẩu hiện tại</label>
                  <input th:field="*{currentPassword}"
                         class="w-full px-md py-sm rounded-lg border border-outline-variant/50 bg-surface-container-lowest font-body-md text-on-surface input-glow transition-all duration-200"
                         type="password" autocomplete="current-password" required />
                  <p class="text-sm text-error" th:if="${#fields.hasErrors('currentPassword')}" th:errors="*{currentPassword}"></p>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-md">
                  <div class="flex flex-col gap-xs">
                    <label class="font-label-md text-label-md text-on-surface-variant">Mật khẩu mới</label>
                    <input th:field="*{newPassword}"
                           class="w-full px-md py-sm rounded-lg border border-outline-variant/50 bg-surface-container-lowest font-body-md text-on-surface input-glow transition-all duration-200"
                           type="password" autocomplete="new-password" required />
                    <p class="text-sm text-error" th:if="${#fields.hasErrors('newPassword')}" th:errors="*{newPassword}"></p>
                  </div>
                  <div class="flex flex-col gap-xs">
                    <label class="font-label-md text-label-md text-on-surface-variant">Xác nhận mật khẩu mới</label>
                    <input th:field="*{confirmPassword}"
                           class="w-full px-md py-sm rounded-lg border border-outline-variant/50 bg-surface-container-lowest font-body-md text-on-surface input-glow transition-all duration-200"
                           type="password" autocomplete="new-password" required />
                    <p class="text-sm text-error" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}"></p>
                  </div>
                </div>
                <div class="flex justify-end mt-sm">
                  <button class="bg-surface-container-high text-primary hover:bg-surface-variant px-lg py-sm rounded-lg font-label-md text-label-md font-semibold transition-colors duration-200 border border-outline-variant/30" type="submit">
                    Cập nhật mật khẩu
                  </button>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>

      <footer th:replace="~{fragments/component/footer :: footer('w-full py-xl mt-auto', 'border-t border-outline-variant/50 bg-surface-container-lowest flex flex-col md:flex-row justify-between items-center px-margin-desktop max-w-7xl mx-auto font-label-sm text-label-sm text-on-surface-variant gap-lg', 'font-display-lg text-title-lg font-black text-primary mb-md md:mb-0', 'text-on-surface-variant', 'hover:text-primary transition-colors cursor-pointer', 'flex gap-lg mb-md md:mb-0')}"></footer>
    </main>
  </body>
</html>
