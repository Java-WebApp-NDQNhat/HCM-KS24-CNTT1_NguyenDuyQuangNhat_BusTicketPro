<aside
  class="hidden md:flex flex-col h-screen w-[280px] fixed left-0 top-0 overflow-y-auto bg-surface-container-lowest border-r border-outline-variant/30 shadow-md z-50"
  th:fragment="passengerSidebar(activeKey, actionPosition, headerClass, actionButtonClass, navClass, footerClass)"
  th:with="activeKey=${activeKey} ?: 'dashboard',
    actionPosition=${actionPosition} ?: 'bottom',
    headerClass=${headerClass} ?: 'flex items-center gap-md p-lg border-b border-outline-variant/20',
    actionButtonClass=${actionButtonClass} ?: 'w-full bg-primary text-on-primary font-inter text-body-md py-md px-md rounded-lg shadow-sm hover:bg-surface-tint transition-colors duration-150 flex items-center justify-center gap-sm',
    navClass=${navClass} ?: 'flex flex-col p-md gap-lg flex-1 mt-md',
    footerClass=${footerClass} ?: 'p-md mt-auto border-t border-outline-variant/20 flex flex-col gap-lg',
    activeClass='flex items-center gap-md bg-surface-container-high text-primary font-semibold rounded-lg px-md py-md border-l-4 border-primary hover:bg-surface-container transition-all duration-150 ease-in-out cursor-pointer active:scale-95',
    inactiveClass='flex items-center gap-md text-on-surface-variant px-md py-md hover:bg-surface-container transition-all duration-150 ease-in-out cursor-pointer active:scale-95 rounded-lg'"
>
  <div th:class="${headerClass}">
    <div class="w-10 h-10 rounded-lg bg-primary flex items-center justify-center shrink-0">
      <span class="material-symbols-outlined text-on-primary fill text-[20px]" data-icon="directions_bus">directions_bus</span>
    </div>
    <div>
      <h1 class="font-manrope text-title-lg font-bold text-on-surface">TransRoute</h1>
      <p class="font-inter text-label-sm text-on-surface-variant">Fleet Management</p>
    </div>
  </div>
  <button th:class="${actionButtonClass}" th:if="${actionPosition == 'top'}">
    <span class="material-symbols-outlined icon-nav" data-icon="add">add</span>
    New Booking
  </button>
  <nav th:class="${navClass}">
    <a
      th:class="${activeKey == 'dashboard'} ? activeClass : inactiveClass"
      href="#"
    >
      <span class="material-symbols-outlined icon-nav fill text-[24px]" data-icon="dashboard">dashboard</span>
      <span class="font-inter text-body-md">Dashboard</span>
    </a>
    <a
      th:class="${activeKey == 'fleet'} ? activeClass : inactiveClass"
      href="#"
    >
      <span class="material-symbols-outlined icon-nav text-[24px]" data-icon="directions_bus">directions_bus</span>
      <span class="font-inter text-body-md">Fleet Management</span>
    </a>
    <a
      th:class="${activeKey == 'ticket-sales'} ? activeClass : inactiveClass"
      href="#"
    >
      <span class="material-symbols-outlined icon-nav text-[24px]" data-icon="confirmation_number">confirmation_number</span>
      <span class="font-inter text-body-md">Ticket Sales</span>
    </a>
    <a
      th:class="${activeKey == 'route-planning'} ? activeClass : inactiveClass"
      href="#"
    >
      <span class="material-symbols-outlined icon-nav text-[24px]" data-icon="map">map</span>
      <span class="font-inter text-body-md">Route Planning</span>
    </a>
    <a
      th:class="${activeKey == 'staff'} ? activeClass : inactiveClass"
      href="#"
    >
      <span class="material-symbols-outlined icon-nav text-[24px]" data-icon="badge">badge</span>
      <span class="font-inter text-body-md">Staff Directory</span>
    </a>
    <a th:class="${activeKey == 'logs'} ? activeClass : inactiveClass" href="#">
      <span class="material-symbols-outlined icon-nav text-[24px]" data-icon="terminal">terminal</span>
      <span class="font-inter text-body-md">System Logs</span>
    </a>
  </nav>
  <div th:class="${footerClass}">
    <button th:class="${actionButtonClass}" th:if="${actionPosition != 'top'}">
      <span class="material-symbols-outlined text-[24px]">add</span>
      New Booking
    </button>
    <div class="flex flex-col gap-lg">
      <a
        th:class="${activeKey == 'settings'} ? activeClass : inactiveClass"
        href="#"
      >
        <span class="material-symbols-outlined text-[24px]" data-icon="settings">settings</span>
        <span class="font-inter text-body-md">Settings</span>
      </a>
      <a
        class="flex items-center gap-md text-error px-md py-md hover:bg-error-container transition-all duration-150 ease-in-out cursor-pointer rounded-lg"
        th:href="@{/auth/logout}"
      >
        <span class="material-symbols-outlined text-[24px]" data-icon="logout">logout</span>
        <span class="font-inter text-body-md">Logout</span>
      </a>
    </div>
  </div>
</aside>
