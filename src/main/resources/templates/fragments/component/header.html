<header
  class="flex justify-between items-center px-lg h-16 w-full bg-surface/80 dark:bg-surface-container/80 backdrop-blur-xl sticky top-0 z-40 border-b border-outline-variant/30 dark:border-outline/20 shadow-sm"
  th:fragment="sharedTopbar"
  xmlns:th="http://www.thymeleaf.org"
  xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
>
  <button class="md:hidden text-on-surface dark:text-surface-bright mr-md">
    <span class="material-symbols-outlined">menu</span>
  </button>

  <div class="flex-1 max-w-md relative hidden sm:block">
    <span class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-outline">search</span>
    <input
      class="w-full bg-surface-container-low dark:bg-surface-container-highest border border-outline-variant/50 text-on-surface dark:text-surface-bright text-label-md rounded-full py-2 pl-xl pr-sm focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all"
      placeholder="Search routes, buses, passengers..."
      type="text"
    />
  </div>

  <div class="flex items-center gap-md ml-auto">
    <button class="text-on-surface-variant dark:text-outline hover:bg-surface-variant/50 dark:hover:bg-surface-container-highest transition-colors cursor-pointer active:scale-95 duration-200 p-2 rounded-full flex items-center justify-center">
      <span class="material-symbols-outlined">dark_mode</span>
    </button>
    <button class="text-on-surface-variant dark:text-outline hover:bg-surface-variant/50 dark:hover:bg-surface-container-highest transition-colors cursor-pointer active:scale-95 duration-200 p-2 rounded-full flex items-center justify-center relative">
      <span class="material-symbols-outlined">notifications</span>
      <span class="absolute top-1 right-2 w-2 h-2 bg-error rounded-full"></span>
    </button>
    <button class="text-on-surface-variant dark:text-outline hover:bg-surface-variant/50 dark:hover:bg-surface-container-highest transition-colors cursor-pointer active:scale-95 duration-200 p-2 rounded-full flex items-center justify-center">
      <span class="material-symbols-outlined">settings</span>
    </button>
    <div class="hidden sm:block h-6 w-px bg-outline-variant/50 mx-sm"></div>
    <button class="hidden sm:flex text-label-md text-primary dark:text-primary-fixed hover:bg-surface-variant/50 dark:hover:bg-surface-container-highest transition-colors cursor-pointer active:scale-95 duration-200 px-sm py-1 rounded">
      Support
    </button>
    <div class="w-8 h-8 rounded-full overflow-hidden border border-outline-variant/50 cursor-pointer">
      <img
        alt="User profile avatar"
        class="w-full h-full object-cover"
        src="https://lh3.googleusercontent.com/aida-public/AB6AXuAwAGBjtStKQ-ohE0-3byff3JH4_XQvri6_PM19i1KZaGuPK6AsXO_1z9yegyknfTxIZkRSCeZA0JOSmolMBL7jKIOO3mu5Ey93PxxDJbUusEYJ-rxWN8-fxukpTQSvs9QYmMlT_Xle5_CXYPFCuM29qdeBRAZl6cgo4-uBh4I9HB4ruDXIKBmmqwJkOTunqwSdL8cY5ZyB6nwitcvJ43m4tGQ7e3CmtiShVxqsbz9OjGylDbcoKeBKRHWxHNY6ArOIvxsgnhizz1A"
      />
    </div>
  </div>
</header>
