<header
  class="sticky top-0 w-full z-40 bg-surface/80 backdrop-blur-xl border-b border-outline-variant/30 shadow-sm flex justify-between items-center px-lg h-16 transition-all"
  th:fragment="passengerBookingTopbar"
>
  <div class="flex items-center gap-md">
    <button class="md:hidden text-on-surface flex items-center justify-center">
      <span class="material-symbols-outlined">menu</span>
    </button>
    <div class="relative hidden sm:flex items-center">
      <span class="material-symbols-outlined absolute left-sm text-outline"
        >search</span
      >
      <input
        class="pl-xl pr-md py-sm rounded-full bg-surface-container border border-outline-variant/50 focus:border-primary focus:ring-2 focus:ring-primary-fixed-dim outline-none font-body-md text-on-surface w-64 transition-all"
        placeholder="Search routes, bookings..."
        type="text"
      />
    </div>
  </div>
  <div class="flex items-center gap-lg">
    <div class="hidden sm:flex items-center gap-md">
      <span
        class="material-symbols-outlined text-on-surface-variant cursor-pointer hover:bg-surface-variant/50 p-sm rounded-full transition-colors active:scale-95 duration-200"
        >notifications</span
      >
      <span
        class="material-symbols-outlined text-on-surface-variant cursor-pointer hover:bg-surface-variant/50 p-sm rounded-full transition-colors active:scale-95 duration-200"
        >settings</span
      >
    </div>
    <button
      class="text-on-surface-variant font-label-md hover:text-primary transition-colors hidden sm:block"
    >
      Support
    </button>
    <div
      class="h-8 w-8 rounded-full bg-primary-fixed flex items-center justify-center cursor-pointer border border-outline-variant/50 overflow-hidden shadow-sm"
    >
      <img
        alt="User profile avatar"
        class="w-full h-full object-cover"
        src="https://lh3.googleusercontent.com/aida-public/AB6AXuAeZ1kw_bdDV5WxFZfJUoj5_uuCXx5XoJyOCD5hBxX5pP5mQOrmMU871wuP1vwjMHn5knOVktJkO4KqOJ74KHxUpthhH23s204z4G4RaQhG7nvC9vvHAA2VBqNZRBwjdHi8ua0DOCKBOfsL1ry6tFGxnyGuZSlAat_JLvuIjsieFkHNpwvhDfuzWpP2j23g9nHAcn3dCNQvHr_WQCdnZ3SyBehRH5-FlFm6-Fl9WaIb-6POixCoJwSxMggs2fsdM9CSuOak0S1Xklk"
      />
    </div>
  </div>
</header>
