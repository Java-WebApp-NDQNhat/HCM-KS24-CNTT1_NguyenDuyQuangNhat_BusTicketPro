<div
  th:fragment="breadcrumb(items)"
  class="flex items-center gap-sm font-label-sm text-label-sm text-on-surface-variant mb-md"
  xmlns:th="http://www.thymeleaf.org"
>
  <a th:href="@{/}" class="hover:text-primary transition-colors">Home</a>
  <th:block th:each="item, iterStat : ${items}">
    <span class="material-symbols-outlined text-[16px]">chevron_right</span>
    <a th:if="${!iterStat.last}" th:href="${item.url}" class="hover:text-primary transition-colors" th:text="${item.label}">Link</a>
    <span th:if="${iterStat.last}" class="text-on-surface font-medium" th:text="${item.label}">Current</span>
  </th:block>
</div>

<div
  th:fragment="pagination(currentPage, totalPages, baseUrl)"
  class="p-md border-t border-outline-variant/30 flex items-center justify-between text-on-surface-variant bg-surface-bright"
  xmlns:th="http://www.thymeleaf.org"
>
  <span class="font-label-sm" th:text="'Page ' + ${currentPage} + ' of ' + ${totalPage}">Showing entries</span>
  <div class="flex gap-xs">
    <button
      th:disabled="${currentPage <= 1}"
      th:attr="onclick='window.location.href=\'' + ${baseUrl} + '?page=' + (${currentPage} - 1) + '\''"
      class="w-8 h-8 flex items-center justify-center rounded-md border border-outline-variant hover:bg-surface-variant transition-colors disabled:opacity-50"
    >
      <span class="material-symbols-outlined text-[18px]">chevron_left</span>
    </button>
    <th:block th:each="i : ${#numbers.sequence(1, totalPages)}">
      <button
        th:class="${i == currentPage}
          ? 'w-8 h-8 flex items-center justify-center rounded-md bg-primary text-on-primary font-label-md'
          : 'w-8 h-8 flex items-center justify-center rounded-md border border-outline-variant hover:bg-surface-variant transition-colors font-label-md'"
        th:attr="onclick='window.location.href=\'' + ${baseUrl} + '?page=' + ${i} + '\''"
        th:text="${i}"
      >1</button>
    </th:block>
    <button
      th:disabled="${currentPage >= totalPages}"
      th:attr="onclick='window.location.href=\'' + ${baseUrl} + '?page=' + (${currentPage} + 1) + '\''"
      class="w-8 h-8 flex items-center justify-center rounded-md border border-outline-variant hover:bg-surface-variant transition-colors disabled:opacity-50"
    >
      <span class="material-symbols-outlined text-[18px]">chevron_right</span>
    </button>
  </div>
</div>

<div
  th:fragment="tableHeader(columns)"
  xmlns:th="http://www.thymeleaf.org"
>
  <thead>
    <tr class="border-b border-outline-variant/30 bg-surface-bright">
      <th th:each="col : ${columns}"
          th:class="${col.align == 'right'} ? 'font-label-sm text-on-surface-variant px-md py-sm font-semibold uppercase tracking-wider text-right'
                   : 'font-label-sm text-on-surface-variant px-md py-sm font-semibold uppercase tracking-wider'"
          th:text="${col.label}"
      >Column</th>
    </tr>
  </thead>
</div>

<div
  th:fragment="statusBadge(label, color)"
  class="inline-flex items-center px-2 py-1 rounded-full text-label-sm"
  th:classappend="${color == 'success'} ? ' bg-[#dcfce7] text-[#166534]'
                : ${color == 'warning'} ? ' bg-[#fef9c3] text-[#854d0e]'
                : ${color == 'error'} ? ' bg-error-container text-on-error-container'
                : ${color == 'info'} ? ' bg-surface-container text-primary'
                : ' bg-surface-variant text-on-surface-variant'"
  xmlns:th="http://www.thymeleaf.org"
>
  <span th:if="${color == 'success' or color == 'warning'}" class="w-1.5 h-1.5 rounded-full mr-1.5"
        th:classappend="${color == 'success'} ? ' bg-[#166534]' : ' bg-[#854d0e]'"></span>
  <span th:text="${label}">Status</span>
</div>
