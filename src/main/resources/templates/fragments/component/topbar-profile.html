<header
  class="bg-surface/80 backdrop-blur-xl sticky top-0 w-full z-40 border-b border-outline-variant/30 shadow-sm flex justify-between items-center px-lg h-16 w-full text-primary font-body-md"
  th:fragment="profileTopbar"
>
  <div class="flex items-center gap-md md:hidden">
    <button
      class="text-on-surface p-sm hover:bg-surface-variant/50 rounded-full transition-colors active:scale-95 duration-200"
    >
      <span class="material-symbols-outlined">menu</span>
    </button>
    <span class="font-headline-md text-headline-lg-mobile font-bold text-on-surface"
      >TransRoute</span
    >
  </div>
  <div
    class="hidden md:flex items-center bg-surface-container-low rounded-full px-md py-xs border border-outline-variant/30 w-96"
  >
    <span class="material-symbols-outlined text-on-surface-variant mr-sm"
      >search</span
    >
    <input
      class="bg-transparent border-none focus:ring-0 w-full font-body-md text-on-surface outline-none"
      placeholder="Search settings..."
      type="text"
    />
  </div>
  <div class="flex items-center gap-md">
    <button
      class="text-on-surface-variant hover:bg-surface-variant/50 p-sm rounded-full transition-colors active:scale-95 duration-200 relative"
    >
      <span class="material-symbols-outlined">notifications</span>
      <span class="absolute top-1 right-1 w-2 h-2 bg-error rounded-full"></span>
    </button>
    <div
      class="h-8 w-8 rounded-full overflow-hidden border border-outline-variant/50 cursor-pointer active:scale-95 duration-200"
    >
      <img
        alt="User profile avatar"
        class="w-full h-full object-cover"
        data-alt="A professional headshot of a person with a warm, confident expression, styled for a corporate SaaS platform profile picture. The lighting is bright and even, set against a clean, abstract minimalist background in cool tones to match a modern interface. The overall mood is approachable yet highly competent and reliable."
