<head th:fragment="commonHead(pageTitle, pageCss, pageKind)" xmlns:th="http://www.thymeleaf.org">

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

            primary: "#000000",
            "tertiary-fixed": "#d8e2ff",
            "surface-container-high": "#dce9ff",
            "on-primary-container": "#7c839b",
            "surface-container-highest": "#d3e4fe",
            "on-primary-fixed": "#131b2e",
            "error-container": "#ffdad6",
            "on-background": "#0b1c30",
            "on-error": "#ffffff",
            tertiary: "#000000",
            "surface-container": "#e5eeff",
            "on-secondary-fixed-variant": "#454747",
            outline: "#76777d",
            "surface-variant": "#d3e4fe",
            background: "#f8f9ff",
            "surface-container-lowest": "#ffffff",
            secondary: "#5d5f5f",

          borderRadius: {
            DEFAULT: "0.25rem",

            "headline-lg": ["manrope"],

          fontSize: {

                letterSpacing: "0.02em",

  <style>
    .material-symbols-outlined {
      font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24;
      line-height: 1;
      vertical-align: middle;
    }
    .material-symbols-outlined.fill {
      font-variation-settings: "FILL" 1, "wght" 400, "GRAD" 0, "opsz" 24;
    }
    .icon-nav {
      font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 20;
      font-size: 20px;
      flex-shrink: 0;
      line-height: 1;
      vertical-align: middle;
    }
    .icon-nav.fill {
      font-variation-settings: "FILL" 1, "wght" 400, "GRAD" 0, "opsz" 20;
    }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background-color: #c6c6cd; border-radius: 10px; }
    .glass-panel {
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
    .dark .glass-panel {
      background: rgba(211, 228, 254, 0.1);
    }
    .card-shadow {
      box-shadow: 0px 10px 15px -3px rgba(0, 0, 0, 0.05);
    }
    .umbra-shadow {
      box-shadow: 0px 10px 15px -3px rgba(0,0,0,0.05);
    }
    .sparkline-line-primary { stroke: #000000; stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; }
    .dark .sparkline-line-primary { stroke: #bec6e0; }
    .sparkline-area-primary { fill: rgba(0, 0, 0, 0.05); }
    .dark .sparkline-area-primary { fill: rgba(190, 198, 224, 0.05); }
    .sparkline-line-success { stroke: #059669; stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; }
    .sparkline-line-error { stroke: #ba1a1a; stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; }
  </style>
  <link rel="stylesheet" th:if="${pageCss != null}" th:href="${pageCss}" />
