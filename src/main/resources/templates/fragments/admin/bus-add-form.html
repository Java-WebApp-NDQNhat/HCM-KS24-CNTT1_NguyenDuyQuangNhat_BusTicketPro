<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
  <head th:replace="~{fragments/head :: commonHead('TransRoute - Add New Bus', @{/css/admin-bus-management.css}, 'admin')}"></head>
  <body class="bg-background text-on-background font-body-md min-h-screen flex selection:bg-surface-variant selection:text-on-surface-variant">
    <div th:replace="~{fragments/sidebar :: sidebar('fleet-management')}"></div>

    <main class="flex-1 md:ml-[280px] w-full min-h-screen flex flex-col relative">
      <header th:replace="~{fragments/component/header :: sharedTopbar}"></header>

      <div class="p-margin-mobile md:p-margin-desktop max-w-3xl mx-auto w-full flex-1 flex flex-col gap-lg">
        <div class="flex items-center gap-md mb-md">
          <a th:href="@{/admin/fleet}" class="text-on-surface-variant hover:text-primary transition-colors p-sm rounded-lg hover:bg-surface-variant/50 flex items-center gap-xs">
            <span class="material-symbols-outlined">arrow_back</span>
          </a>
          <div>
            <h2 class="font-headline-lg-mobile md:font-headline-lg text-on-surface">Add New Bus</h2>
            <p class="font-body-md text-on-surface-variant mt-xs">Register a new bus to your fleet inventory.</p>
          </div>
        </div>

        <form class="bg-surface-container-lowest rounded-xl border border-outline-variant/30 umbra-shadow overflow-hidden flex flex-col">
          <div class="p-lg border-b border-outline-variant/30 bg-surface-bright">
            <h3 class="font-title-lg text-on-surface">Bus Information</h3>
          </div>

          <div class="p-lg flex flex-col gap-lg">
            <div class="flex flex-col gap-xs">
              <label class="font-label-md text-on-surface-variant uppercase tracking-wider">Plate Number <span class="text-error">*</span></label>
              <input class="w-full p-sm border border-outline-variant rounded-lg font-body-md focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all outline-none bg-surface-container-lowest" placeholder="e.g. AB-1234" required type="text" />
            </div>

            <div class="flex flex-col gap-xs">
              <label class="font-label-md text-on-surface-variant uppercase tracking-wider">Model Type <span class="text-error">*</span></label>
              <select class="w-full p-sm border border-outline-variant rounded-lg font-body-md focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all outline-none bg-surface-container-lowest" required>
                <option value="">Select a model...</option>
                <option>VIP Coach</option>
                <option>Standard</option>
                <option>Minibus</option>
              </select>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-lg">
              <div class="flex flex-col gap-xs">
                <label class="font-label-md text-on-surface-variant uppercase tracking-wider">Total Seats <span class="text-error">*</span></label>
                <input class="w-full p-sm border border-outline-variant rounded-lg font-body-md focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all outline-none bg-surface-container-lowest" placeholder="e.g. 42" required type="number" />
              </div>
              <div class="flex flex-col gap-xs">
                <label class="font-label-md text-on-surface-variant uppercase tracking-wider">Year Manufactured</label>
                <input class="w-full p-sm border border-outline-variant rounded-lg font-body-md focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all outline-none bg-surface-container-lowest" placeholder="e.g. 2024" type="number" />
              </div>
            </div>

            <div class="flex flex-col gap-xs">
              <label class="font-label-md text-on-surface-variant uppercase tracking-wider">Initial Status</label>
              <div class="grid grid-cols-2 gap-sm mt-xs">
                <label class="flex items-center gap-sm p-sm border border-primary bg-surface-variant rounded-lg cursor-pointer">
                  <input checked class="text-primary focus:ring-primary" name="status" type="radio" value="active" />
                  <span class="font-label-md text-on-surface">Active</span>
                </label>
                <label class="flex items-center gap-sm p-sm border border-outline-variant rounded-lg cursor-pointer hover:bg-surface-container-low transition-colors">
                  <input class="text-primary focus:ring-primary" name="status" type="radio" value="standby" />
                  <span class="font-label-md text-on-surface">Standby</span>
                </label>
              </div>
            </div>

            <div class="flex flex-col gap-xs">
              <label class="font-label-md text-on-surface-variant uppercase tracking-wider">Notes</label>
              <textarea class="w-full p-sm border border-outline-variant rounded-lg font-body-md focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all outline-none bg-surface-container-lowest resize-none" placeholder="Optional notes about this bus..." rows="3"></textarea>
            </div>
          </div>

          <div class="p-lg border-t border-outline-variant/30 bg-surface-bright flex justify-end gap-md">
            <a th:href="@{/admin/fleet}" class="font-label-md text-on-surface-variant px-md py-sm rounded-lg hover:bg-surface-variant transition-colors border border-outline-variant">Back to Fleet</a>
            <button class="bg-primary text-on-primary font-label-md px-lg py-sm rounded-lg hover:shadow-lg transition-all" type="submit">Save Bus</button>
          </div>
        </form>
      </div>

      <footer class="w-full py-xl mt-auto bg-surface-container-lowest dark:bg-on-primary-fixed border-t border-outline-variant/50 flex flex-col md:flex-row justify-between items-center px-margin-mobile md:px-margin-desktop">
        <div class="font-manrope text-title-lg font-black text-primary mb-sm md:mb-0">TransRoute</div>
        <p class="font-inter text-label-sm text-on-surface-variant dark:text-outline-variant">© 2026 TransRoute Logistics SaaS. All rights reserved.</p>
        <div class="flex gap-md mt-sm md:mt-0">
          <a class="font-inter text-label-sm text-on-surface-variant dark:text-outline hover:text-primary transition-colors cursor-pointer" href="#">Privacy Policy</a>
          <a class="font-inter text-label-sm text-on-surface-variant dark:text-outline hover:text-primary transition-colors cursor-pointer" href="#">Terms of Service</a>
          <a class="font-inter text-label-sm text-on-surface-variant dark:text-outline hover:text-primary transition-colors cursor-pointer" href="#">API Docs</a>
          <a class="font-inter text-label-sm text-on-surface-variant dark:text-outline hover:text-primary transition-colors cursor-pointer" href="#">Status</a>
        </div>
      </footer>
    </main>
  </body>
</html>
