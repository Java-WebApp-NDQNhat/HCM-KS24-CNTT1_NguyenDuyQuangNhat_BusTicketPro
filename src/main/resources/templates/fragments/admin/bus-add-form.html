<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
  <head th:replace="~{fragments/head :: commonHead('TransRoute - Add New Bus', @{/css/admin-bus-management.css}, 'admin')}"></head>
  <body class="bg-background text-on-background font-body-md min-h-screen flex selection:bg-surface-variant selection:text-on-surface-variant">
    <div th:replace="~{fragments/sidebar :: sidebar('fleet-management')}"></div>

    <main class="flex-1 md:ml-[280px] w-full min-h-screen flex flex-col relative">
      <header th:replace="~{fragments/component/header :: sharedTopbar}"></header>

      <div class="p-margin-mobile md:p-margin-desktop max-w-3xl mx-auto w-full flex-1 flex flex-col gap-lg">
        <div class="flex items-center gap-md mb-md">
          <a th:href="@{/admin/fleet}" class="text-on-surface-variant hover:text-primary transition-colors p-sm rounded-lg hover:bg-surface-variant/50 flex items-center gap-xs">
            <span class="material-symbols-outlined">arrow_back</span>
          </a>
          <div>
            <h2 class="font-headline-lg-mobile md:font-headline-lg text-on-surface">Add New Bus</h2>
            <p class="font-body-md text-on-surface-variant mt-xs">Register a new bus to your fleet inventory.</p>
          </div>
        </div>

        <form th:action="@{/admin/fleet/save}" method="post" th:object="${bus}"
              class="bg-surface-container-lowest rounded-xl border border-outline-variant/30 umbra-shadow overflow-hidden flex flex-col">
          <input type="hidden" th:field="*{id}" />

          <div class="p-lg border-b border-outline-variant/30 bg-surface-bright">
            <h3 class="font-title-lg text-on-surface"
                th:text="${bus.id == null or bus.id == 0 ? 'Add Bus Information' : 'Edit Bus Information'}">Bus Information</h3>
          </div>

          <div class="p-lg flex flex-col gap-lg">
            <div class="flex flex-col gap-xs">
              <label class="font-label-md text-on-surface-variant uppercase tracking-wider">Plate Number <span class="text-error">*</span></label>
              <input th:field="*{plateNumber}"
                     th:classappend="${#fields.hasErrors('plateNumber') or plateNumErr != null} ? 'border-error focus:ring-error/20 focus:border-error' : 'border-outline-variant focus:border-primary focus:ring-primary/20'"
                     class="w-full p-sm border rounded-lg font-body-md transition-all outline-none bg-surface-container-lowest" placeholder="e.g. AB-1234" required type="text" />

              <div class="text-sm text-error mt-1" th:if="${#fields.hasErrors('plateNumber')}" th:errors="*{plateNumber}"></div>
              <!-- Hiển thị lỗi Unique từ Database bắt qua khối catch -->
              <div class="text-sm text-error mt-1" th:if="${plateNumErr}" th:text="${plateNumErr}"></div>
            </div>

            <div class="flex flex-col gap-xs">
              <label class="font-label-md text-on-surface-variant uppercase tracking-wider">Model Type <span class="text-error">*</span></label>
              <select th:field="*{model}"
                      th:classappend="${#fields.hasErrors('model')} ? 'border-error focus:ring-error/20 focus:border-error' : 'border-outline-variant focus:border-primary focus:ring-primary/20'"
                      class="w-full p-sm border rounded-lg font-body-md transition-all outline-none bg-surface-container-lowest" required>
                <option value="">Select a model...</option>
                <option value="vip">VIP</option>
                <option value="standard">Standard</option>
                <option value="mini">Mini</option>
              </select>
              <div class="text-sm text-error mt-1" th:if="${#fields.hasErrors('model')}" th:errors="*{model}"></div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-lg">
              <div class="flex flex-col gap-xs">
                <label class="font-label-md text-on-surface-variant uppercase tracking-wider">Total Seats <span class="text-error">*</span></label>
                <input th:field="*{totalSeats}"
                       th:classappend="${#fields.hasErrors('totalSeats')} ? 'border-error focus:ring-error/20 focus:border-error' : 'border-outline-variant focus:border-primary focus:ring-primary/20'"
                       class="w-full p-sm border rounded-lg font-body-md transition-all outline-none bg-surface-container-lowest" placeholder="e.g. 42" required type="number" />
                <div class="text-sm text-error mt-1" th:if="${#fields.hasErrors('totalSeats')}" th:errors="*{totalSeats}"></div>
              </div>

              <div class="flex flex-col gap-xs">
                <label class="font-label-md text-on-surface-variant uppercase tracking-wider">Select Route <span class="text-error">*</span></label>
                <select th:field="*{assignedRoute}"
                        th:classappend="${#fields.hasErrors('assignedRoute')} ? 'border-error focus:ring-error/20 focus:border-error' : 'border-outline-variant focus:border-primary focus:ring-primary/20'"
                        class="w-full p-sm border rounded-lg font-body-md transition-all outline-none bg-surface-container-lowest" required>
                  <option value="">Select a route...</option>
                  <option th:each="r : ${allRoutes}"
                          th:value="${r.id}"
                          th:text="${r.fromLocation.name + ' - ' + r.toLocation.name}">
                  </option>
                </select>
                <div class="text-sm text-error mt-1" th:if="${#fields.hasErrors('assignedRoute')}" th:errors="*{assignedRoute}"></div>
              </div>
            </div>

            <div class="flex flex-col gap-xs">
              <label class="font-label-md text-on-surface-variant uppercase tracking-wider">Initial Status</label>
              <div class="grid grid-cols-2 gap-sm mt-xs">
                <label class="flex items-center gap-sm p-sm border border-outline-variant rounded-lg cursor-pointer hover:bg-surface-container-low transition-colors">
                  <input th:field="*{status}" class="text-primary focus:ring-primary" type="radio" value="Active" />
                  <span class="font-label-md text-on-surface">Active</span>
                </label>

                <label class="flex items-center gap-sm p-sm border border-outline-variant rounded-lg cursor-pointer hover:bg-surface-container-low transition-colors">
                  <input th:field="*{status}" class="text-primary focus:ring-primary" type="radio" value="Maintenance" />
                  <span class="font-label-md text-on-surface">Maintenance</span>
                </label>
              </div>
              <div class="text-sm text-error mt-1" th:if="${#fields.hasErrors('status')}" th:errors="*{status}"></div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-lg">
              <div class="flex flex-col gap-xs">
                <label class="font-label-md text-on-surface-variant uppercase tracking-wider">Company <span class="text-error">*</span></label>
                <input th:field="*{company}"
                       th:classappend="${#fields.hasErrors('company')} ? 'border-error focus:ring-error/20 focus:border-error' : 'border-outline-variant focus:border-primary focus:ring-primary/20'"
                       class="w-full p-sm border rounded-lg font-body-md transition-all outline-none bg-surface-container-lowest" placeholder="e.g. Phuong Trang" required type="text" />
                <div class="text-sm text-error mt-1" th:if="${#fields.hasErrors('company')}" th:errors="*{company}"></div>
              </div>

              <div class="flex flex-col gap-xs">
                <label class="font-label-md text-on-surface-variant uppercase tracking-wider">Driver Name <span class="text-error">*</span></label>
                <input th:field="*{driver}"
                       th:classappend="${#fields.hasErrors('driver')} ? 'border-error focus:ring-error/20 focus:border-error' : 'border-outline-variant focus:border-primary focus:ring-primary/20'"
                       class="w-full p-sm border rounded-lg font-body-md transition-all outline-none bg-surface-container-lowest" placeholder="e.g. Nguyen A" required type="text" />
                <div class="text-sm text-error mt-1" th:if="${#fields.hasErrors('driver')}" th:errors="*{driver}"></div>
              </div>
            </div>

          </div>

          <div class="p-lg border-t border-outline-variant/30 bg-surface-bright flex justify-end gap-md">
            <a th:href="@{/admin/fleet}" class="font-label-md text-on-surface-variant px-md py-sm rounded-lg hover:bg-surface-variant transition-colors border border-outline-variant">Back to Fleet</a>

            <button class="bg-primary text-on-primary font-label-md px-lg py-sm rounded-lg hover:shadow-lg transition-all" type="submit"
                    th:text="${bus.id == null or bus.id == 0 ? 'Add Bus' : 'Save Changes'}">
              Save Bus
            </button>
          </div>
        </form>
      </div>

      <footer th:replace="~{fragments/component/footer :: footer(null, null, null, null, null, null)}"></footer>
    </main>
  </body>
</html>
