<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:fragment="adminHead(pageTitle)">
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title th:text="${pageTitle}">Admin Analytics Dashboard - TransRoute SaaS</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Manrope:wght@600;700;900&amp;display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-container-low": "#eff4ff",
                        "on-error-container": "#93000a",
                        "error-container": "#ffdad6",
                        "primary-fixed-dim": "#bec6e0",
                        "surface-variant": "#d3e4fe",
                        "surface-dim": "#cbdbf5",
                        "on-surface-variant": "#45464d",
                        "secondary": "#5d5f5f",
                        "on-primary-fixed": "#131b2e",
                        "surface-bright": "#f8f9ff",
                        "secondary-container": "#dfe0e0",
                        "background": "#f8f9ff",
                        "on-primary-fixed-variant": "#3f465c",
                        "on-background": "#0b1c30",
                        "tertiary-container": "#001a42",
                        "secondary-fixed": "#e2e2e2",
                        "on-primary-container": "#7c839b",
                        "surface-container-lowest": "#ffffff",
                        "surface-container-high": "#dce9ff",
                        "on-primary": "#ffffff",
                        "error": "#ba1a1a",
                        "primary-fixed": "#dae2fd",
                        "outline-variant": "#c6c6cd",
                        "surface-container": "#e5eeff",
                        "secondary-fixed-dim": "#c6c6c7",
                        "on-tertiary-fixed-variant": "#004395",
                        "on-secondary-container": "#616363",
                        "on-tertiary": "#ffffff",
                        "tertiary-fixed": "#d8e2ff",
                        "inverse-surface": "#213145",
                        "inverse-on-surface": "#eaf1ff",
                        "on-secondary-fixed": "#1a1c1c",
                        "on-error": "#ffffff",
                        "tertiary-fixed-dim": "#adc6ff",
                        "on-tertiary-container": "#3980f4",
                        "outline": "#76777d",
                        "on-tertiary-fixed": "#001a42",
                        "tertiary": "#000000",
                        "primary": "#000000",
                        "primary-container": "#131b2e",
                        "surface": "#f8f9ff",
                        "on-surface": "#0b1c30",
                        "surface-container-highest": "#d3e4fe",
                        "surface-tint": "#565e74",
                        "inverse-primary": "#bec6e0",
                        "on-secondary-fixed-variant": "#454747",
                        "on-secondary": "#ffffff"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "md": "16px",
                        "xl": "32px",
                        "lg": "24px",
                        "margin-mobile": "16px",
                        "gutter": "24px",
                        "xs": "4px",
                        "margin-desktop": "40px",
                        "base": "8px",
                        "sm": "8px"
                    },
                    "fontFamily": {
                        "label-sm": ["Inter"],
                        "label-md": ["Inter"],
                        "title-lg": ["Inter"],
                        "body-lg": ["Inter"],
                        "display-lg": ["Manrope"],
                        "body-md": ["Inter"],
                        "headline-lg": ["Manrope"],
                        "headline-md": ["Manrope"],
                        "headline-lg-mobile": ["Manrope"]
                    },
                    "fontSize": {
                        "label-sm": ["11px", { "lineHeight": "14px", "fontWeight": "600" }],
                        "label-md": ["12px", { "lineHeight": "16px", "letterSpacing": "0.02em", "fontWeight": "500" }],
                        "title-lg": ["20px", { "lineHeight": "28px", "fontWeight": "600" }],
                        "body-lg": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "display-lg": ["48px", { "lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "body-md": ["14px", { "lineHeight": "20px", "fontWeight": "400" }],
                        "headline-lg": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "600" }],
                        "headline-md": ["24px", { "lineHeight": "32px", "fontWeight": "600" }],
                        "headline-lg-mobile": ["24px", { "lineHeight": "32px", "fontWeight": "600" }]
                    }
                }
            }
        }
    </script>
    <style>
        .glass-panel {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
        .dark .glass-panel {
            background: rgba(211, 228, 254, 0.1);
        }
        .card-shadow {
            box-shadow: 0px 10px 15px -3px rgba(0,0,0,0.05);
        }
        .sparkline-line-primary { stroke: #000000; stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; }
        .dark .sparkline-line-primary { stroke: #bec6e0; }
        .sparkline-area-primary { fill: rgba(0, 0, 0, 0.05); }
        .dark .sparkline-area-primary { fill: rgba(190, 198, 224, 0.05); }
        .sparkline-line-success { stroke: #059669; stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; }
        .sparkline-line-error { stroke: #ba1a1a; stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; }
    </style>
</head>
</html>
